name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.1)"
        required: true
        type: string
      prerelease:
        description: "Create as prerelease"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Rename release jar
        shell: bash
        run: |
          release_jar=""
          for file in build/libs/*.jar; do
            case "$file" in
              *-sources.jar) ;;
              *)
                release_jar="$file"
                break
                ;;
            esac
          done

          if [ -z "$release_jar" ]; then
            echo "No release jar found in build/libs"
            exit 1
          fi

          cp "$release_jar" "build/libs/RidhoXNoqwd.jar"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RidhoXNoqwd-jar
          path: build/libs/RidhoXNoqwd.jar

      - name: Create GitHub release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG_NAME="$INPUT_TAG"
            PRERELEASE="$INPUT_PRERELEASE"
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG_NAME="$REF_NAME"
            PRERELEASE="false"
          else
            TAG_NAME="latest"
            PRERELEASE="true"
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "build/libs/RidhoXNoqwd.jar" --clobber
            gh release edit "$TAG_NAME" --target "$GITHUB_SHA" --title "$TAG_NAME" --notes "Automated release for $GITHUB_SHA"
            exit 0
          fi

          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$TAG_NAME" "build/libs/RidhoXNoqwd.jar" --target "$GITHUB_SHA" --title "$TAG_NAME" --notes "Automated release for $TAG_NAME" --prerelease
          else
            gh release create "$TAG_NAME" "build/libs/RidhoXNoqwd.jar" --target "$GITHUB_SHA" --title "$TAG_NAME" --notes "Automated release for $TAG_NAME"
          fi
